version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - corepack enable
        - export NODE_OPTIONS=--max-old-space-size=4096
        - pnpm install --frozen-lockfile
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - corepack enable
        - export NODE_OPTIONS=--max-old-space-size=4096
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
