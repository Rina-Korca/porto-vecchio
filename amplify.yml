version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 22
        - corepack enable
        - export NODE_OPTIONS=--max-old-space-size=4096
        - pnpm install --frozen-lockfile
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir . --outputs-format json --outputs-version 1.4
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - corepack enable
        - export NODE_OPTIONS=--max-old-space-size=4096
        - test -f amplify_outputs.json
        - node -e "const o=require('./amplify_outputs.json'); if (!o.data?.url || !o.data?.model_introspection) throw new Error('amplify_outputs.json is missing data outputs')"
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
